<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>配列への代入　構文について</title>
</head>
<body>

    <h1>配列へのアクセス（代入）構文</h1>

    <p>JavaScriptの配列（はいれつ）は、複数のデータを順番つきでまとめて保存できる箱のようなものです。
        <br>
        配列へのアクセス（代入）とは、
        <br>
        **「配列の〇番目にあるデータを見る・書きかえること」**です。
    </p>


    
    <script>
        
        //  具体例（JavaScriptコード）
        // 配列を作成
        let fruits = ["りんご", "バナナ", "みかん"];
        // 配列の〇番にアクセス
        console.log(fruits[0]);

        // 配列の1番目に新しい値を代入（上書き）
        fruits[1] = "ブドウ";
        console.log(fruits);


    </script>


</body>
</html>
