<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Function構文について</title>
</head>
<body>

    <h1>Function構文</h1>

    <p></p>


    
    <script>
        
        function sayHello() {
            console.log("こんにちは");
        }

        sayHello();


        function greet(name) {
            console.log("こんにちは、" + name + "さん！");
        }

        greet("太郎");
        greet("花子");


        function add(a,b) {
            return a + b;
        }

        const result = add(3,5);
        console.log(result);

        sayHello();
        sayHello();
        sayHello();
        

    </script>

</body>
</html>
