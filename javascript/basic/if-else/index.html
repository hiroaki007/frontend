<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>if構文（条件分岐）について</title>
</head>
<body>

    <h1>if構文（条件分岐）</h1>

    <p>「もし○○ならこの処理をする」というように、条件によってプログラムの動きを分ける仕組みです。</p>


    
    <script>
        
        
        let score = 18; 

        if(score >= 18) {
            console.log("大人です");
               
        } else {
            console.log("未成年です")
        }


        let isLogin = true;

        if(isLogin) {
            console.log("マイページを表示します");
        } else {
            console.log("ログイン画面を表示します");
        }
        
    

    </script>

</body>
</html>
