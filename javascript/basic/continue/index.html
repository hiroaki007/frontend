<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>continue構文について</title>
</head>
<body>

    <h1>continue構文</h1>

    <p></p>


    
    <script>
        
        for(let i = 1; i <= 5; i++) {
            if(i === 3) {
                continue;
            }
            console.log(i);
        }

        
        const number = [10, 0, 5, 0, 8, 0, 9];

        for(let n of number) {
            if(n === 0) {
                continue;
            }
            console.log(n * 2);
        }
        

    </script>

</body>
</html>
