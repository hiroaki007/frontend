<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>変数 練習</title>
</head>
<body>
    
    <script>
        
        // 配列（リスト）からの多重代入
        const numbers = [10, 20];

        const [a, b] = numbers;

        console.log(a);
        console.log(b);

        console.log(a + b);


        // オブジェクトでも多重代入できる

        // const user = {
        //     name: "Taro",
        //     age : 20
        // };

        // const { name, age } = user;

        // console.log(name);
        // console.log(age);

        // 中級者向け

        // 配列の多重代入（分割代入）

        const user1 = ["taro", 30, "Tokyo"];
        let [name1, age1, city1] = user1;

        console.log(name1); 
        console.log(name1 = ("taro2")); 
        console.log(name1, age1); 

        // オブジェクトの多重代入（分割代入）

        const user = {
            id: 1,
            name: "Taro",
            role: "admin"
        }

        const { id, name, role } = user;

        console.log(id, name, role);



        // 初期値付き多重代入

        const [x = 0, y = 0] = [10];



    </script>

</body>
</html>
