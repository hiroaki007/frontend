<!DOCTYPE html>

    <title>array構文について</title>
</head>
<body>

    <h1>array</h1>

    <p>**配列（はいれつ）とは、たくさんのデータをひとまとめにして順番に保存できる箱**のようなものです。

JavaScriptでは、数・文字・真偽（true / false）など、**いろいろな種類のデータをまとめて扱うために配列を作成できます。**</p>


    
    <script>
       
    //    一番シンプルな配列の作成

    const numbers = [10, 20, 30];

    // 文字の配列 

    const names = ["田中", "佐藤", "鈴木"];

    // 空の配列を作成する

    const items = [];

    // 空の配列を作る意味

    items.push("りんご");
    items.push("みかん");

    


    </script>

</body>
</html>
