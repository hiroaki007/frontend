<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>型のキャスト（型変換）について</title>
</head>
<body>

    <h1>型のキャスト（型変換）</h1>

    <p>*型のキャスト（型変換）**とは、データの種類（型）を別の型に変えることです。</p>


    
    <script>
        
        // 文字列を数値に変換する

        let price = "100";
        let total = Number(price) + 50;

        console.log(total); 

        // 数値を文字列に変換する

        let age = 20; 
        let message = String(age) + "歳です";

        console.log(age);

        // 自動で型変換される例
        
        let result = "10" * 2;
        console.log(result); 


        

    </script>

</body>
</html>
