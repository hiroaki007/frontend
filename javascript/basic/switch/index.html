<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>switch構文について</title>
</head>
<body>

    <h1>switch構文</h1>

    <p></p>


    
    <script>
        
        
        const day = "水";

        switch(day) {
            case "月":
                console.log("今日は月曜日です");
                break;
            case "火":
                console.log("今日は火曜日です");
                break
            case "水":
                console.log("今日は水曜日です");
                break
            default:
                console.log("曜日がわかりません");
        }
        


    

    </script>

</body>
</html>
